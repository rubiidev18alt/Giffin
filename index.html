<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Giffin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;font-family:Inter,sans-serif}
body{margin:0;background:#161616;color:#fff}
header{padding:24px;text-align:center;font-size:34px;font-weight:700;background:#232323;border-bottom:2px solid #333}
main{max-width:1100px;margin:auto;padding:24px}
.panel{background:#232323;padding:18px;border-radius:16px;margin-bottom:18px}
button{border:none;background:#4f7cff;color:#fff;padding:10px 18px;border-radius:10px;cursor:pointer}
button:hover{background:#3d67e6}
#gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px}
.thumb{background:#2f2f2f;padding:10px;border-radius:12px}
.thumb img{width:100%;height:120px;object-fit:contain;background:#111;border-radius:8px}
.thumb .row{display:flex;gap:4px;margin-top:6px}
.thumb button{flex:1;padding:6px}
#preview{max-width:420px;display:block;margin:auto;background:#111;border-radius:12px}
progress{width:100%;height:24px}
</style>
</head>
<body>
<header>🖼️ Giffin</header>
<main>
<div class="panel">
<input id="files" type="file" multiple accept="image/*">
<label> Delay (ms)
<input id="delay" type="number" value="120" min="20">
</label>
<button id="make">Create GIF</button>
</div>

<div class="panel">
<h2>Frames</h2>
<div id="gallery"></div>
</div>

<div class="panel">
<h2>Preview</h2>
<progress id="progress" max="100" value="0"></progress><br><br>
<img id="preview">
<br><br>
<a id="download"></a>
</div>
</main>

<script type="module">
import {GIFEncoder, quantize, applyPalette} from "https://cdn.jsdelivr.net/npm/gifenc@1/+esm";

const files=document.getElementById("files");
const gallery=document.getElementById("gallery");
const preview=document.getElementById("preview");
const progress=document.getElementById("progress");
const download=document.getElementById("download");

let images=[];

files.onchange=e=>{
  for(const f of e.target.files){
    const r=new FileReader();
    r.onload=()=>{images.push(r.result);refresh();}
    r.readAsDataURL(f);
  }
};

window.up=i=>{if(i>0){[images[i],images[i-1]]=[images[i-1],images[i]];refresh();}}
window.down=i=>{if(i<images.length-1){[images[i],images[i+1]]=[images[i+1],images[i]];refresh();}}
window.removeFrame=i=>{images.splice(i,1);refresh();}

function refresh(){
 gallery.innerHTML="";
 images.forEach((src,i)=>{
  const d=document.createElement("div");
  d.className="thumb";
  d.innerHTML=`<img src="${src}"><div class=row>
  <button onclick="up(${i})">↑</button>
  <button onclick="down(${i})">↓</button>
  <button onclick="removeFrame(${i})">✕</button></div>`;
  gallery.appendChild(d);
 });
}

document.getElementById("make").onclick=async()=>{
 if(!images.length){alert("Add some images first.");return;}
 progress.value=0;
 const delay=parseInt(document.getElementById("delay").value)||120;
 const loaded=[];
 for(const src of images){
   const img=new Image();
   img.src=src;
   await img.decode();
   loaded.push(img);
 }
 const w=loaded[0].naturalWidth,h=loaded[0].naturalHeight;
 const c=document.createElement("canvas");
 c.width=w;c.height=h;
 const ctx=c.getContext("2d",{willReadFrequently:true});
 const gif=GIFEncoder();
 for(let i=0;i<loaded.length;i++){
   ctx.clearRect(0,0,w,h);
   ctx.drawImage(loaded[i],0,0,w,h);
   const rgba=ctx.getImageData(0,0,w,h);
   const palette=quantize(rgba.data,256);
   const index=applyPalette(rgba.data,palette);
   gif.writeFrame(index,w,h,{palette,delay});
   progress.value=((i+1)/loaded.length)*100;
 }
 gif.finish();
 const blob=new Blob([new Uint8Array(gif.bytes())],{type:"image/gif"});
 const url=URL.createObjectURL(blob);
 preview.src=url;
 download.href=url;
 download.download="giffin.gif";
 download.textContent="⬇ Download GIF";
};
</script>
</body>
</html>
