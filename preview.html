<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giffin</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box;
    font-family:Inter,sans-serif;
}

body{
    margin:0;
    background:#161616;
    color:white;
}

header{
    padding:25px;
    text-align:center;
    font-size:34px;
    font-weight:700;
    background:#232323;
    border-bottom:2px solid #333;
}

main{
    max-width:1100px;
    margin:auto;
    padding:25px;
}

.panel{
    background:#232323;
    padding:20px;
    border-radius:16px;
    margin-bottom:20px;
}

button,input{
    margin:6px;
}

button{
    border:none;
    background:#4f7cff;
    color:white;
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    background:#3d67e6;
}

input[type=number]{
    padding:8px;
    border-radius:8px;
    width:90px;
}

#gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
    gap:15px;
}

.thumb{
    background:#2f2f2f;
    border-radius:12px;
    padding:10px;
    text-align:center;
}

.thumb img{
    width:100%;
    height:120px;
    object-fit:contain;
    background:#111;
    border-radius:8px;
}

.thumb button{
    width:100%;
    margin-top:5px;
    padding:7px;
    font-size:13px;
}

#preview{
    display:block;
    max-width:400px;
    margin:auto;
    border-radius:12px;
    background:#111;
    min-height:100px;
}

progress{
    width:100%;
    height:25px;
}
</style>
</head>
<body>

<header>
🖼️ Giffin
</header>

<main>

<div class="panel">

<input type="file" id="files" multiple accept="image/*">

<br>

<label>
Frame Delay (ms):
<input type="number" id="delay" value="120" min="20">
</label>

<button id="make">Create GIF</button>

</div>

<div class="panel">

<h2>Frames</h2>

<div id="gallery"></div>

</div>

<div class="panel">

<h2>Preview / Download</h2>

<progress value="0" max="100" id="progress"></progress>

<br><br>

<img id="preview">

<br><br>

<a id="download"></a>

</div>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>

<script>

let images=[];

const gallery=document.getElementById("gallery");

document.getElementById("files").onchange=e=>{

for(const file of e.target.files){

const reader=new FileReader();

reader.onload=()=>{

images.push(reader.result);

refresh();

}

reader.readAsDataURL(file);

}

}

function refresh(){

gallery.innerHTML="";

images.forEach((img,index)=>{

const div=document.createElement("div");

div.className="thumb";

div.innerHTML=`
<img src="${img}">
<button onclick="up(${index})">⬆️</button>
<button onclick="down(${index})">⬇️</button>
<button onclick="removeFrame(${index})">❌ Remove</button>
`;

gallery.appendChild(div);

});

}

function up(i){

if(i==0)return;

[images[i],images[i-1]]=[images[i-1],images[i]];

refresh();

}

function down(i){

if(i>=images.length-1)return;

[images[i],images[i+1]]=[images[i+1],images[i]];

refresh();

}

function removeFrame(i){

images.splice(i,1);

refresh();

}

document.getElementById("make").onclick=()=>{

if(images.length===0){

alert("Add some images first.");

return;

}

const gif=new GIF({

workers:2,

quality:10,

workerScript:"https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js"

});

const delay=parseInt(document.getElementById("delay").value);

let loaded=0;

images.forEach(src=>{

const img=new Image();

img.onload=()=>{

gif.addFrame(img,{delay});

loaded++;

if(loaded===images.length){

gif.render();

}

};

img.src=src;

});

gif.on("progress",p=>{

document.getElementById("progress").value=p*100;

});

gif.on("finished",blob=>{

const url=URL.createObjectURL(blob);

const preview=document.getElementById("preview");

preview.src=url;

const dl=document.getElementById("download");

dl.href=url;

dl.download="giffin.gif";

dl.textContent="⬇️ Download GIF";

dl.style.display="inline-block";

});

};

</script>

</body>
</html>
